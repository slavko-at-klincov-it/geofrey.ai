llm:
  model: "qwen3.5:9b"
  base_url: "http://localhost:11434"
  temperature: 0.3

embedding:
  model: "nomic-embed-text"

chunking:
  chunk_size: 512
  chunk_overlap: 50

retrieval:
  top_k: 5

paths:
  vectordb: "~/.knowledge/vectordb"
  context: "knowledge-base/context"
  claude_code_kb: "knowledge-base/claude-code"
  inbox: "~/knowledge/inbox"
  linkedin_posts: "data/linkedin/all_posts.md"
  session_learnings: "knowledge-base/sessions"
  decisions: "knowledge-base/decisions"
  claude_projects: "~/.claude/projects"

decision_system:
  enabled: true
  collection_name: "decisions"

chat:
  history_length: 5

orchestrator:
  max_history: 20
  temperature: 0.3

linkedin:
  temperature: 0.7

skills:
  default: "code-fix"
  enabled:
    - code-fix
    - feature
    - review
    - research
    - security
    - refactor
    - doc-sync

model_policy:
  code: "opus"
  analysis: "opus"
  content: "sonnet"

skill_defaults:
  code-fix:
    model_category: "code"
    max_budget_usd: 5.0
    max_turns: 30
    permission_mode: "default"
    needs_plan: false
  feature:
    model_category: "code"
    max_budget_usd: 10.0
    max_turns: 50
    permission_mode: "default"
    needs_plan: true
  refactor:
    model_category: "code"
    max_budget_usd: 10.0
    max_turns: 50
    permission_mode: "default"
    needs_plan: true
  review:
    model_category: "analysis"
    max_budget_usd: 2.0
    max_turns: 15
    permission_mode: "plan"
    needs_plan: false
  research:
    model_category: "analysis"
    max_budget_usd: 5.0
    max_turns: 20
    permission_mode: "plan"
    needs_plan: false
  security:
    model_category: "analysis"
    max_budget_usd: 5.0
    max_turns: 20
    permission_mode: "plan"
    needs_plan: false
  doc-sync:
    model_category: "content"
    max_budget_usd: 3.0
    max_turns: 30
    permission_mode: "default"
    needs_plan: false
