<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>geofrey.ai — Freight Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="sidebar">
    <div class="sidebar-header">
      <h1>geofrey<span class="accent">.ai</span></h1>
      <p class="subtitle">Freight Visibility</p>
    </div>

    <div class="add-form">
      <input type="text" id="trackingInput" placeholder="Tracking number / MMSI / AWB..." />
      <button id="addBtn" title="Add tracking">+</button>
    </div>

    <div id="shipmentList" class="shipment-list">
      <div class="empty-state">No shipments tracked</div>
    </div>

    <div class="sidebar-footer">
      <span class="connection-status" id="connStatus">Connecting...</span>
    </div>
  </div>

  <div id="map"></div>

  <button id="toggleSidebar" class="toggle-btn" title="Toggle sidebar">☰</button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
